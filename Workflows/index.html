<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Assistant</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f7fb;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            color: #222;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            font-size: 16px;
            resize: vertical;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        textarea:focus {
            border-color: #4a90e2;
        }

        button {
            padding: 11px 18px;
            margin-top: 10px;
            margin-right: 8px;
            cursor: pointer;
            border: none;
            border-radius: 7px;
            font-size: 15px;
            background: #4a90e2;
            color: white;
        }

        button:hover {
            background: #357abd;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .stop-btn {
            background: #e74c3c;
        }

        .stop-btn:hover {
            background: #c0392b;
        }

        .response {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            white-space: pre-wrap;
            min-height: 80px;
            line-height: 1.5;
        }

        .status {
            margin-top: 12px;
            font-weight: bold;
        }

        .upload-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        input[type="file"] {
            margin-top: 10px;
            padding: 8px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .loading {
            color: #e67e22;
        }
    </style>
</head>


<body>

    <div class="container">

        <h2>🤖 AI Assistant</h2>

        <textarea
            id="question"
            placeholder="Ask me anything...

Examples:
• Latest AI news
• What does my PDF say?
• Explain Artificial Intelligence
">
        </textarea>

        <br>

        <button id="sendBtn" onclick="askAssistant()">
            🚀 Send
        </button>

        <button class="stop-btn" onclick="stopSpeaking()">
            🔇 Stop Speaking
        </button>

        <p id="status" class="status">
            Status: Idle
        </p>

        <div id="answer" class="response">
            AI answer will appear here...
        </div>


        <!-- PDF UPLOAD SECTION -->

        <div class="upload-section">

            <h3>📄 Upload Knowledge Base PDF</h3>

            <input
                type="file"
                id="pdfFile"
                accept=".pdf,application/pdf">

            <br>

            <button id="uploadBtn" onclick="uploadPDF()">
                📤 Upload PDF
            </button>

            <p id="uploadStatus" class="status">
                Upload: Idle
            </p>

        </div>

    </div>


    <script>

        // =====================================================
        // N8N WEBHOOK URLS
        // =====================================================

        const assistantWebhook =
            "https://monalgaur.app.n8n.cloud/webhook-test/voice-agent";

        const uploadWebhook =
            "https://monalgaur.app.n8n.cloud/webhook-test/upload-kb";


        // =====================================================
        // GET HTML ELEMENTS
        // =====================================================

        const questionInput =
            document.getElementById("question");

        const answerBox =
            document.getElementById("answer");

        const statusText =
            document.getElementById("status");

        const sendBtn =
            document.getElementById("sendBtn");

        const uploadBtn =
            document.getElementById("uploadBtn");

        const uploadStatus =
            document.getElementById("uploadStatus");


        // =====================================================
        // ASK AI ASSISTANT
        // =====================================================

        async function askAssistant() {

            const question =
                questionInput.value.trim();


            // Check empty question

            if (!question) {

                statusText.innerText =
                    "Status: Please enter a question";

                statusText.className =
                    "status error";

                return;
            }


            // Stop previous speech

            stopSpeaking();


            // Update UI

            statusText.innerText =
                "Status: Thinking...";

            statusText.className =
                "status loading";

            answerBox.innerText =
                "🤔 AI is thinking...";

            sendBtn.disabled = true;


            try {

                const response =
                    await fetch(assistantWebhook, {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            question: question

                        })

                    });


                // Check HTTP error

                if (!response.ok) {

                    throw new Error(
                        `HTTP Error: ${response.status}`
                    );

                }


                // Get response as text first

                const rawResponse =
                    await response.text();


                console.log(
                    "Raw n8n Response:",
                    rawResponse
                );


                let data;


                // Try JSON parsing

                try {

                    data =
                        JSON.parse(rawResponse);

                }

                catch {

                    data =
                        rawResponse;

                }


                // Extract AI answer

                let answer =
                    extractAnswer(data);


                if (!answer) {

                    answer =
                        "No answer received from AI.";

                }


                // Display answer

                answerBox.innerText =
                    answer;


                statusText.innerText =
                    "Status: Done";

                statusText.className =
                    "status success";


                // Read answer aloud

                speakAnswer(answer);

            }


            catch (error) {

                console.error(
                    "Assistant Error:",
                    error
                );


                statusText.innerText =
                    "Status: Error";

                statusText.className =
                    "status error";


                answerBox.innerText =
                    "❌ Error: " + error.message;

            }


            finally {

                sendBtn.disabled =
                    false;

            }

        }


        // =====================================================
        // EXTRACT ANSWER FROM N8N RESPONSE
        // =====================================================

        function extractAnswer(data) {

            // If response is plain text

            if (typeof data === "string") {

                return data;

            }


            // If response is an array

            if (Array.isArray(data)) {

                data =
                    data[0];

            }


            if (!data) {

                return "";

            }


            // Common n8n AI response fields

            return (

                data.answer ||

                data.output ||

                data.text ||

                data.message ||

                data.response ||

                data.result ||

                data.content ||

                data.data ||

                JSON.stringify(data, null, 2)

            );

        }


        // =====================================================
        // TEXT TO SPEECH
        // =====================================================

        function speakAnswer(text) {

            // Check browser support

            if (!("speechSynthesis" in window)) {

                console.warn(
                    "Text-to-Speech is not supported"
                );

                return;

            }


            // Stop previous speech

            window.speechSynthesis.cancel();


            const speech =
                new SpeechSynthesisUtterance(text);


            // Speech settings

            speech.lang =
                "en-IN";

            speech.rate =
                1;

            speech.pitch =
                1;

            speech.volume =
                1;


            // Speak answer

            window.speechSynthesis.speak(speech);

        }


        // =====================================================
        // STOP SPEAKING
        // =====================================================

        function stopSpeaking() {

            if ("speechSynthesis" in window) {

                window.speechSynthesis.cancel();

            }

        }


        // =====================================================
        // ENTER KEY SUPPORT
        // =====================================================

        questionInput.addEventListener(
            "keydown",
            function (event) {

                if (
                    event.key === "Enter" &&
                    !event.shiftKey
                ) {

                    event.preventDefault();

                    askAssistant();

                }

            }
        );


        // =====================================================
        // PDF UPLOAD
        // =====================================================

        async function uploadPDF() {

            const fileInput =
                document.getElementById("pdfFile");

            const file =
                fileInput.files[0];


            // Check file

            if (!file) {

                uploadStatus.innerText =
                    "Upload: Please choose a PDF first";

                uploadStatus.className =
                    "status error";

                return;

            }


            // Check PDF

            if (file.type !== "application/pdf") {

                uploadStatus.innerText =
                    "Upload: Only PDF files are allowed";

                uploadStatus.className =
                    "status error";

                return;

            }


            const formData =
                new FormData();


            formData.append(
                "file",
                file
            );


            uploadStatus.innerText =
                "Upload: Uploading...";

            uploadStatus.className =
                "status loading";

            uploadBtn.disabled =
                true;


            try {

                const response =
                    await fetch(uploadWebhook, {

                        method: "POST",

                        body: formData

                    });


                if (!response.ok) {

                    throw new Error(
                        `HTTP Error: ${response.status}`
                    );

                }


                const rawResponse =
                    await response.text();


                console.log(
                    "Upload Response:",
                    rawResponse
                );


                uploadStatus.innerText =
                    "Upload: PDF uploaded successfully ✅";

                uploadStatus.className =
                    "status success";

            }


            catch (error) {

                console.error(
                    "Upload Error:",
                    error
                );


                uploadStatus.innerText =
                    "Upload: Failed ❌ " +
                    error.message;

                uploadStatus.className =
                    "status error";

            }


            finally {

                uploadBtn.disabled =
                    false;

            }

        }

    </script>

</body>

</html>
